<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyer Portal - e-LinkAcre</title>
  <link rel="stylesheet" href="../css/buyers.css">
</head>
<body>
  <div class="header">
    <div class="left-nav-links">
      <img src="../images/e-Linkacre logo.png" alt="e-LinkAcre Logo" onclick="window.location.href='../index.html'">
    </div>
    <div class="middle-nav-links">
      <h1>Buyer Portal</h1>
      <input type="search" placeholder="Search products, farms, orders...">
    </div>
    <div class="right-nav-links">
      <a href="../index.html" class="right-nav-link-home">Home</a>
      <div class="dropdown">
        <a class="right-nav-link1" href="#">Profile</a>
        <div class="dropdown-content">
          <a href="#">Company Profile</a>
          <a href="#">Settings</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="sidebar">
      <a href="buyer-dashboard.html" target="contentFrame" class="active" onclick="setActive(this)">Dashboard</a>
      <a href="buyer-marketplace.html" target="contentFrame" onclick="setActive(this)">Marketplace</a>
      <a href="buyer-orders.html" target="contentFrame" onclick="setActive(this)">My Orders</a>
      <a href="buyer-trends.html" target="contentFrame" onclick="setActive(this)">Market Trends</a>
    </div>
    <div class="content">
      <iframe name="contentFrame" src="buyer-dashboard.html"></iframe>
    </div>
  </div>

  <script>
    function setActive(element) {
      const links = document.querySelectorAll('.sidebar a');
      links.forEach(link => link.classList.remove('active'));
      element.classList.add('active');
    }
  </script>
</body>
</html>
